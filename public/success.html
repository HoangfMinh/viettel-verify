<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel - Xác thực thành công</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .success-icon {
            font-size: 80px;
            background: #d4edda;
            width: 120px;
            height: 120px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .info-box {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" style="max-width:450px; text-align:center;">
            <div class="success-icon">✅</div>
            <h1 style="color:#28a745;">XÁC THỰC THÀNH CÔNG!</h1>
            <p>Cảm ơn bạn đã cập nhật thông tin thuê bao theo <strong>Thông tư 08/2026/TT-BKHCN</strong>.</p>
            <div class="info-box">
                🔒 <strong>Tài khoản của bạn đã được bảo vệ</strong>
                <p>Thông tin của bạn đã được xác thực và lưu trữ an toàn</p>
            </div>
            <button onclick="window.location.href='/'">🏠 Về trang chủ</button>
            <hr>
            <div class="footer"><p>📞 Cần hỗ trợ? Gọi <strong>198</strong> (miễn phí)</p></div>
        </div>
    </div>
</body>
</html>
